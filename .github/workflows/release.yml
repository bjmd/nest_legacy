---
name: "Release"

on:
  release:
    types:
      - published

jobs:
  release:
    name: "Release nest_legacy"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "⬇️ Checkout the repository"
        uses: actions/checkout@v6

      - name: "🔢 Adjust version number"
        shell: bash
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version,,}"
          version="${version#v}"
          yq e -P -o=json \
            -i ".version = \"${version}\"" \
            "${{ github.workspace }}/custom_components/nest_legacy/manifest.json"
      - name: "📦 Created zipped release package"
        shell: bash
        run: |
          cd "${{ github.workspace }}/custom_components/nest_legacy"
          zip nest_legacy.zip -r ./
      - name: "⬆️ Upload zip to release"
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ github.workspace }}/custom_components/nest_legacy/nest_legacy.zip
